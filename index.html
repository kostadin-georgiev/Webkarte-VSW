<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="content-type" content="text/html; charset=utf-8">
<title>HLNUG Audiomonitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
<!-- Leaflet Locate Control CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol@0.77.0/dist/L.Control.Locate.min.css" />
    
<style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }

    .legend {
        background: white;
        padding: 10px 14px;
        font-size: 12px;
        line-height: 18px;
        color: #333;
        border-radius: 4px;
    }
    .legend i {
        width: 16px;
        height: 16px;
        float: left;
        margin-right: 6px;
        opacity: 0.95;
    }
</style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet Locate Control JS -->
<script src="https://unpkg.com/leaflet.locatecontrol@0.77.0/dist/L.Control.Locate.min.js"></script>
    
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Esri Leaflet (SECOND!) -->
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js" ></script>

<!-- Locate Control -->
<script src="https://unpkg.com/leaflet.locatecontrol@0.77.0/dist/L.Control.Locate.min.js" ></script>

<!-- PapaParse for CSV -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<script>

/* =====================================================
   BASE MAPS
===================================================== */
const openTopoMap = L.tileLayer(
    'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
    { 
    attribution: '© OpenTopoMap contributors',
    opacity: 0.9   // 0 = transparent, 1 = solid
        }
);

const esriSatellite = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { 
    attribution: 'Tiles © Esri',
    opacity: 0.9   // 0 = transparent, 1 = solid
    }
);

/* =====================================================
   MAP INITIALIZATION (Hesse)
===================================================== */
const map = L.map('map', {
    center: [50.6, 9.0],
    zoom: 8.5,
    layers: [openTopoMap]
  });
    
// =========================
// PANES (z-index control)
// =========================
map.createPane("polygonsPane");
map.getPane("polygonsPane").style.zIndex = 400;

map.createPane("pointsPane");
map.getPane("pointsPane").style.zIndex = 500;

/* =====================================================
   ORNITHO RASTER HESSEN (Local GeoJSON Polygon)
===================================================== */

const ornithoRasterStyle = {
    color: '#757171',
    weight: 1,
    fillColor: '#fcfcfc',
    fillOpacity: 0.05
};
    
const ornithoRasterHoverStyle = {
    color: '#ffffff',
    weight: 3
};
    
const ornithoRasterLayer = L.geoJSON(null, {
    pane: "polygonsPane",
    style: ornithoRasterStyle,
    onEachFeature: function(feature, layer) {

    // Add click event for each feature
    layer.on('click', function (e) {
            L.popup()
                .setLatLng(e.latlng)
                .setContent(`<b>ID_PLACE:</b><br>${feature.properties.ID_PLACE}`)
                .openOn(map);
        });

    }
});  

// Load local GeoJSON file
fetch("ornitho_raster_hessen.geojson")
    .then(response => response.json())
    .then(data => ornithoRasterLayer.addData(data))
    .catch(error => console.error("Ornitho Raster load error:", error));
    
/* =====================================================
   LAEA RASTER HESSEN (Local GeoJSON Polygon)
===================================================== */

const laeaRasterStyle = {
    color: '#757171',
    weight: 1,
    fillColor: '#fcfcfc',
    fillOpacity: 0.05
};
    
const laeaRasterHoverStyle = {
    color: '#ffffff',
    weight: 3
};
    
const laeaRasterLayer = L.geoJSON(null, {
    pane: "polygonsPane",
    style: laeaRasterStyle,
    onEachFeature: function(feature, layer) {

    // Add click event for each feature
    layer.on('click', function (e) {
            L.popup()
                .setLatLng(e.latlng)
                .setContent(`<b>CellCode:</b><br>${feature.properties.CellCode}`)
                .openOn(map);
        });

    }
});  

// Load local GeoJSON file
fetch("LEAE_Raster.geojson")
    .then(response => response.json())
    .then(data => laeaRasterLayer.addData(data))
    .catch(error => console.error("LAEA Raster load error:", error));
    
/* =====================================================
    VOGELSCHUTZGEBIETE LAYER (GeoJSON from ArcGIS REST) 
	===================================================== */ 

	const vogelschutzLayer = L.esri.featureLayer({
		 url: "https://geodienste-umwelt.hessen.de/arcgis/rest/services/inspire/schutzgebiete/MapServer/0",
		 pane: "polygonsPane",
		 minZoom: 9,
		 style: {
			 color: '#ff8c00',
			 weight: 3,
			 fillColor: '#ff8c00',
			 fillOpacity: 0.3
		 }
	})

	vogelschutzLayer.bindPopup(function (layer) {
		return `<b>Vogelschutzgebiet:</b><br>${layer.feature.properties.NAME || "-"}`;
});


/* =====================================================
    FLORA-FAUNA-HABITATE (FFH) LAYER
    (GeoJSON from ArcGIS REST)
===================================================== */ 

	const ffhLayer = L.esri.featureLayer({
		 url: "https://geodienste-umwelt.hessen.de/arcgis/rest/services/inspire/schutzgebiete/MapServer/1",
		 pane: "polygonsPane",
		 minZoom: 9,
		 style: {
			 color: '#5A40DD',
			 weight: 2,
			 fillColor: '#5A40DD',
			 fillOpacity: 0.2
		 }
	})
	
	map.on('overlayadd', function (e) {
		if (e.layer === ffhLayer) {
			ffhLayer.addTo(map);
		}
	});

	ffhLayer.bindPopup(function (layer) {
		 return `<b>FFH-Gebiet:</b><br>${layer.feature.properties.NAME || "-"}`; });


/* =====================================================
    NSG LAYER
    (GeoJSON from ArcGIS REST)
===================================================== */

const NSGStyle = {
     color: '#3DAAE1',
     weight: 2,
     fillColor: '#3DAAE1',
     fillOpacity: 0.25
};

const NSGLayer = L.esri.featureLayer({
     url: "https://geodienste-umwelt.hessen.de/arcgis/rest/services/inspire/schutzgebiete/MapServer/2",
     pane: "polygonsPane",
	 minZoom: 9,
     style: {
         color: '#3DAAE1',
         weight: 2,
         fillColor: '#3DAAE1',
         fillOpacity: 0.25
     }
})

NSGLayer.bindPopup(function (layer) {
     return `<b>NSG-Gebiet:</b><br>${layer.feature.properties.NAME || 
"-"}`;
});

/* =====================================================
   trackIT 65  Stk POINT LAYER FROM CSV (X/Y, EPSG:4326)
===================================================== */
const audioRecorderLayer65 = L.geoJSON(null, {
        pointToLayer: function(feature, latlng) {
        return L.circleMarker(latlng, {
            pane: "pointsPane",
            radius: 6,
            color: '#0000ff',
            fillColor: '#0000ff',
            fillOpacity: 0.5
        });
    },
    onEachFeature: function (feature, layer) {
  if (feature.properties) {
    layer.bindTooltip(`
            <b>ID_PLACE:</b> ${feature.properties.ID_PLACE}<br>
            <b>Forstamt:</b> ${feature.properties.Forstamt}<br>
            <b>Forstrevier:</b> ${feature.properties.FO_Revier}<br>
            <b>Staatswald:</b> ${feature.properties.Staatswald}<br>
      `,
      { sticky: true }
    );
  }
}

});

// Load CSV and convert to GeoJSON
Papa.parse('Audiorecorder_trackIT_VSG_Monitoring_WGS84_2026_Stand-26022026.csv', {
    download: true,
    header: true,
    dynamicTyping: true,
    encoding: "UTF-8", // WICHTIG für Umlaute
    complete: function(results) {
        const geojson = {
            type: 'FeatureCollection',
            features: []
        };

        results.data.forEach(row => {
            if (row.X !== undefined && row.Y !== undefined) {
                geojson.features.push({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [row.X, row.Y] },
                    properties: row
                });
            }
        });

        audioRecorderLayer65.addData(geojson);
    }
});
    
/* =====================================================
   VSW 130  Stk POINT LAYER FROM CSV (X/Y, EPSG:4326)
===================================================== */
const audioRecorderLayer = L.geoJSON(null, {
        pointToLayer: function(feature, latlng) {
        return L.circleMarker(latlng, {
            pane: "pointsPane",
            radius: 5,
            color: '#002900',
            fillColor: '#00ff00',
            fillOpacity: 0.7
        });
    },
    onEachFeature: function (feature, layer) {
  if (feature.properties) {
    layer.bindTooltip(`
            <b>ID_PLACE:</b> ${feature.properties.ID_PLACE}<br>
            <b>Forstamt:</b> ${feature.properties.Forstamt}<br>
            <b>Forstrevier:</b> ${feature.properties.FO_Revier}<br>
            <b>Staatswald:</b> ${feature.properties.Staatswald}<br>
      `,
      { sticky: true }
    );
  }
}

});

// Load CSV and convert to GeoJSON
Papa.parse('Audiorecorder_VSW_VSG_Monitoring_WGS84_2026_Stand-26022026.csv', {
    download: true,
    header: true,
    dynamicTyping: true,
    encoding: "UTF-8", // WICHTIG für Umlaute
    complete: function(results) {
        const geojson = {
            type: 'FeatureCollection',
            features: []
        };

        results.data.forEach(row => {
            if (row.X !== undefined && row.Y !== undefined) {
                geojson.features.push({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [row.X, row.Y] },
                    properties: row
                });
            }
        });

        audioRecorderLayer.addData(geojson);
    }
});
    
/* =====================================================
   LAYER CONTROL (TOP LEFT)
===================================================== */
const baseMaps = {
    "OpenTopoMap": openTopoMap,
    "ESRI Satellite": esriSatellite
};

const overlayMaps = {
    "Audiorecorder trackIT 65 Stk.": audioRecorderLayer65,
    "Audiorecorder Songmeter/VSW 130 Stk.": audioRecorderLayer,
    "VSG": vogelschutzLayer,
    "FFH": ffhLayer,
    "NSG": NSGLayer,
    "Ornitho Raster Hessen": ornithoRasterLayer,
    "LAEA Raster": laeaRasterLayer
};

L.control.layers(baseMaps, overlayMaps, { 
    position: 'topleft', 
    collapsed: true 
}).addTo(map);


/* =====================================================
   GPS CONTROL FOR MOBILE
===================================================== */
L.control.locate({
    position: 'topleft',
    strings: { title: "Show my location" },
    flyTo: true,
    keepCurrentZoomLevel: false,
    showPopup: true,
    locateOptions: { enableHighAccuracy: true }
}).addTo(map);

// =========================
  // Scale bar (bottom-left)
  // =========================
  L.control.scale({
    position: "bottomleft",
    metric: true,
    imperial: false
  }).addTo(map);

</script>
</body>
</html>
